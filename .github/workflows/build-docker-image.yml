name: Build Docker image

on:
  push:
    branches:
      - main
    paths:
      - build-versions.env
      - Dockerfile
      - .github/workflows/build-docker-image.yml
  workflow_dispatch:
    inputs:
      omnetpp_version:
        description: OMNeT++ version
        required: false
        type: string
      inet_version:
        description: INET version
        required: false
        type: string
      simu5g_version:
        description: Simu5G version
        required: false
        type: string
      build_debug:
        description: Build debug binaries too
        required: false
        default: true
        type: boolean
      with_ide:
        description: Include IDE and Qt support
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prepare:
    name: Prepare build inputs
    runs-on: ubuntu-latest
    outputs:
      omnetpp_version: ${{ steps.vars.outputs.omnetpp_version }}
      inet_version: ${{ steps.vars.outputs.inet_version }}
      simu5g_version: ${{ steps.vars.outputs.simu5g_version }}
      build_debug: ${{ steps.vars.outputs.build_debug }}
      with_ide: ${{ steps.vars.outputs.with_ide }}
      build_mode: ${{ steps.vars.outputs.build_mode }}
      version_tag: ${{ steps.vars.outputs.version_tag }}
      description: ${{ steps.vars.outputs.description }}
      license: ${{ steps.vars.outputs.license }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve build inputs
        id: vars
        shell: bash
        run: |
          defaults_file="build-versions.env"
          source "$defaults_file"

          omnetpp_version="${{ github.event.inputs.omnetpp_version }}"
          inet_version="${{ github.event.inputs.inet_version }}"
          simu5g_version="${{ github.event.inputs.simu5g_version }}"
          build_debug="${{ github.event.inputs.build_debug }}"
          with_ide="${{ github.event.inputs.with_ide }}"

          if [[ -z "$omnetpp_version" ]]; then omnetpp_version="$OMNETPP_VERSION"; fi
          if [[ -z "$inet_version" ]]; then inet_version="$INET_VERSION"; fi
          if [[ -z "$simu5g_version" ]]; then simu5g_version="$SIMU5G_VERSION"; fi
          if [[ -z "$build_debug" ]]; then build_debug="true"; fi
          if [[ -z "$with_ide" ]]; then with_ide="true"; fi

          if [[ "$build_debug" == "true" ]]; then
            build_mode="debug"
          else
            build_mode="release"
          fi

          version_tag="${omnetpp_version}-inet${inet_version}-simu5g${simu5g_version}-${build_mode}"

          echo "omnetpp_version=${omnetpp_version}" >> "$GITHUB_OUTPUT"
          echo "inet_version=${inet_version}" >> "$GITHUB_OUTPUT"
          echo "simu5g_version=${simu5g_version}" >> "$GITHUB_OUTPUT"
          echo "build_debug=${build_debug}" >> "$GITHUB_OUTPUT"
          echo "with_ide=${with_ide}" >> "$GITHUB_OUTPUT"
          echo "build_mode=${build_mode}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${version_tag}" >> "$GITHUB_OUTPUT"

          echo "description=${DESCRIPTION}" >> "$GITHUB_OUTPUT"
          echo "license=${LICENSE}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Compute image references
        id: refs
        shell: bash
        run: |
          version_tag="${{ needs.prepare.outputs.version_tag }}"
          image_ref="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${version_tag}-${{ matrix.arch }}"

          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version_tag }}

      - name: Filter Docker labels
        id: filtered-labels
        shell: bash
        env:
          METADATA_LABELS: ${{ steps.meta.outputs.labels }}
        run: |
          filtered_labels="$(printf '%s\n' "$METADATA_LABELS" | awk -F= '
            $1 != "org.opencontainers.image.description" &&
            $1 != "org.opencontainers.image.licenses" { print }
          ')"

          {
            echo 'labels<<EOF'
            printf '%s\n' "$filtered_labels"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arch image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.refs.outputs.image_ref }}
          labels: ${{ steps.filtered-labels.outputs.labels }}
          build-args: |
            BUILD_DEBUG=${{ needs.prepare.outputs.build_debug }}
            WITH_IDE=${{ needs.prepare.outputs.with_ide }}
            OMNETPP_VERSION=${{ needs.prepare.outputs.omnetpp_version }}
            INET_VERSION=${{ needs.prepare.outputs.inet_version }}
            SIMU5G_VERSION=${{ needs.prepare.outputs.simu5g_version }}
            DESCRIPTION=${{ needs.prepare.outputs.description }}
            LICENSE=${{ needs.prepare.outputs.license }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  manifest:
    name: Publish manifest
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    if: github.event_name != 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve manifest references
        id: refs
        shell: bash
        run: |
          version_tag="${{ needs.prepare.outputs.version_tag }}"
          final_image_ref="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${version_tag}"
          amd64_image_ref="${final_image_ref}-amd64"
          arm64_image_ref="${final_image_ref}-arm64"

          echo "final_image_ref=${final_image_ref}" >> "$GITHUB_OUTPUT"
          echo "amd64_image_ref=${amd64_image_ref}" >> "$GITHUB_OUTPUT"
          echo "arm64_image_ref=${arm64_image_ref}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        id: create
        run: |
          docker buildx imagetools create \
            --tag "${{ steps.refs.outputs.final_image_ref }}" \
            --annotation "index:org.opencontainers.image.description=${{ needs.prepare.outputs.description }}" \
            --annotation "index:org.opencontainers.image.licenses=${{ needs.prepare.outputs.license }}" \
            "${{ steps.refs.outputs.amd64_image_ref }}" \
            "${{ steps.refs.outputs.arm64_image_ref }}"

          DIGEST=$(docker buildx imagetools inspect "${{ steps.refs.outputs.final_image_ref }}" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.0
        with:
          cosign-release: v3.0.6

      - name: Sign the published Docker manifest
        env:
          IMAGE_REF: ${{ steps.create.outputs.digest }}
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign sign --yes \
            --registry-referrers-mode=oci-1-1 \
            -a "repo=${{ github.repository }}" \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@$IMAGE_REF"
