name: Build Docker image

on:
  push:
    branches:
      - main
    paths:
      - build-versions.env
      - Dockerfile
      - .github/workflows/build-docker-image.yml
  workflow_dispatch:
    inputs:
      omnetpp_version:
        description: OMNeT++ version
        required: false
        type: string
      inet_version:
        description: INET version
        required: false
        type: string
      simu5g_version:
        description: Simu5G version
        required: false
        type: string
      build_debug:
        description: Build debug binaries too
        required: false
        default: true
        type: boolean
      with_ide:
        description: Include IDE and Qt support
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve build inputs
        id: vars
        shell: bash
        run: |
          defaults_file="build-versions.env"
          source "$defaults_file"

          omnetpp_version="${{ github.event.inputs.omnetpp_version }}"
          inet_version="${{ github.event.inputs.inet_version }}"
          simu5g_version="${{ github.event.inputs.simu5g_version }}"
          build_debug="${{ github.event.inputs.build_debug }}"
          with_ide="${{ github.event.inputs.with_ide }}"

          if [[ -z "$omnetpp_version" ]]; then omnetpp_version="$OMNETPP_VERSION"; fi
          if [[ -z "$inet_version" ]]; then inet_version="$INET_VERSION"; fi
          if [[ -z "$simu5g_version" ]]; then simu5g_version="$SIMU5G_VERSION"; fi
          if [[ -z "$build_debug" ]]; then build_debug="true"; fi
          if [[ -z "$with_ide" ]]; then with_ide="true"; fi

          if [[ "$build_debug" == "true" ]]; then
            build_mode="debug"
          else
            build_mode="release"
          fi

          version_tag="${omnetpp_version}-inet${inet_version}-simu5g${simu5g_version}-${build_mode}"

          echo "omnetpp_version=${omnetpp_version}" >> "$GITHUB_OUTPUT"
          echo "inet_version=${inet_version}" >> "$GITHUB_OUTPUT"
          echo "simu5g_version=${simu5g_version}" >> "$GITHUB_OUTPUT"
          echo "build_debug=${build_debug}" >> "$GITHUB_OUTPUT"
          echo "with_ide=${with_ide}" >> "$GITHUB_OUTPUT"
          echo "build_mode=${build_mode}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${version_tag}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.version_tag }}

      - name: Filter Docker labels
        id: filtered-labels
        shell: bash
        env:
          METADATA_LABELS: ${{ steps.meta.outputs.labels }}
        run: |
          filtered_labels="$(printf '%s\n' "$METADATA_LABELS" | awk -F= '
            $1 != "org.opencontainers.image.description" &&
            $1 != "org.opencontainers.image.licenses" { print }
          ')"

          {
            echo 'labels<<EOF'
            printf '%s\n' "$filtered_labels"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.0
        with:
          cosign-release: v3.0.6

      - name: Build and push multi-arch image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.filtered-labels.outputs.labels }}
          build-args: |
            BUILD_DEBUG=${{ steps.vars.outputs.build_debug }}
            WITH_IDE=${{ steps.vars.outputs.with_ide }}
            OMNETPP_VERSION=${{ steps.vars.outputs.omnetpp_version }}
            INET_VERSION=${{ steps.vars.outputs.inet_version }}
            SIMU5G_VERSION=${{ steps.vars.outputs.simu5g_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the published Docker image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: |
          cosign sign --yes \
            --registry-referrers-api oci \
            -a "repo=${{ github.repository }}" \
            -a "workflow=${{ github.workflow }}" \
            -a "sha=${{ github.sha }}" \
            ${{ steps.meta.outputs.tags }}@${DIGEST}
